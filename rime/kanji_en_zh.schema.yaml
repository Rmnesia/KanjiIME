schema:
  schema_id: kanji_en_zh
  name: "KanjiIME ZH"
  version: "0.1.0"

switches:
  - name: ascii_mode
    reset: 0
    states: [ KanjiIME, ASCII ]

engine:
  processors:
    - ascii_composer
    - key_binder
    - speller
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - abc_segmentor
    - fallback_segmentor
  translators:
    - table_translator
    - echo_translator
  filters:
    - uniquifier

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ-' "
  delimiter: " '"
  algebra:
    - xform/^([A-Z])/\L$1/

translator:
  dictionary: kanji_en_zh
  enable_sentence: false
  enable_user_dict: false
  comment_format:
    - xform/^~//

key_binder:
  bindings:
    - { when: composing, accept: space, send: Return }
    - { when: has_menu, accept: minus, send: Page_Up }
    - { when: has_menu, accept: equal, send: Page_Down }
    - { when: always, accept: Control+1, select: kanji_en_jp }
    - { when: always, accept: Control+2, select: kanji_en_zh }
    - { when: always, accept: Control+3, select: kanji_en_hk }
